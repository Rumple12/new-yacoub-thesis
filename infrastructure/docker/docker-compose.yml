services:
  n8n:
    image: n8nio/n8n:1.123.37
    container_name: new-yacoub-n8n
    restart: unless-stopped
    ports:
      - "${N8N_HOST_PORT:-5678}:5678"
    environment:
      N8N_HOST: "${N8N_HOST:-localhost}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      N8N_SECURE_COOKIE: "${N8N_SECURE_COOKIE:-false}"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:-replace-with-a-local-development-key}"
      GENERIC_TIMEZONE: "${GENERIC_TIMEZONE:-Europe/Stockholm}"
      TZ: "${GENERIC_TIMEZONE:-Europe/Stockholm}"
      N8N_DIAGNOSTICS_ENABLED: "${N8N_DIAGNOSTICS_ENABLED:-false}"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "${N8N_VERSION_NOTIFICATIONS_ENABLED:-false}"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
